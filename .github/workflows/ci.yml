name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/recruitme
          AUTH_SECRET: 12345678901234567890123456789012
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: pnpm ci
